<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator ean</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.12.1/JsBarcode.all.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; }
        svg { max-width: 80%; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <svg id="barcode"></svg>
    <br>
    <button onclick="generate()">Losuj nowy kod</button>

    <script>
        function generate() {
            if (typeof JsBarcode === 'undefined') {
                console.error("Biblioteka jeszcze się ładuje...");
                return;
            }

            const prefix = Math.random() < 0.5 ? "ECHO19" : "ECHO20";
            const randomNumber = Math.floor(Math.random() * 900000) + 100000;
            const finalCode = prefix + randomNumber;

            JsBarcode("#barcode", finalCode, {
                format: "CODE128",
                displayValue: true
            });
        }

        window.onload = function() {
            generate();
        };
    </script>
</body>
</html>
